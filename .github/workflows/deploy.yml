name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  # Gate: typecheck + the full Vitest suite must pass before we deploy.
  # Runs on every push and PR. The suite is integration-style (hits Postgres
  # via Prisma and Redis via BullMQ), so we stand both up as service containers.
  test:
    name: tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hooksmith
          POSTGRES_PASSWORD: hooksmith
          POSTGRES_DB: hooksmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hooksmith"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hooksmith:hooksmith@localhost:5432/hooksmith
      REDIS_URL: redis://localhost:6379
      # Throwaway key (base64 of 32 random bytes). Only ever encrypts ephemeral
      # CI test rows — NOT a production secret.
      ENCRYPTION_KEY: rzVxtrE/Q6AuOQGXtz1fNStJELTbY6CTMu4gSQu5JmE=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm run test

  deploy:
    name: Deploy to production
    needs: test
    # Never deploy from a PR — only pushes to main (and manual dispatch).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize deploys: never run two at once.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin the server's host key so the runner can't be MITM'd.
          echo "157.180.91.106 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILPoKZ0omSSw3gRk+NFDYrLY71/7AC0FZTwB4TJ37jQd" >> ~/.ssh/known_hosts

      - name: Trigger deploy
        # The authorized_keys entry on the server pins this key to running
        # /usr/local/bin/odyhook-deploy.sh — passing any command here is
        # ignored. We still pass an explicit one so the workflow log is
        # self-documenting.
        run: ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@157.180.91.106 deploy
